<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OCG Aggregator</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,sans-serif;margin:0;background:#f7f7f4;color:#181816}
    header{background:#20251f;color:white;padding:14px 22px;display:flex;gap:20px;align-items:center}
    header a{color:white;text-decoration:none}
    main{max-width:1100px;margin:0 auto;padding:24px}
    table{width:100%;border-collapse:collapse;background:white}
    th,td{padding:10px;border-bottom:1px solid #ddd;text-align:left;vertical-align:top}
    input,textarea,button{font:inherit;padding:9px;border:1px solid #bbb;border-radius:4px}
    button{background:#245d49;color:white;border-color:#245d49;cursor:pointer}
    .muted{color:#666}.pill{display:inline-block;padding:2px 7px;border-radius:12px;background:#e5ece8;font-size:.85rem}.warn{color:#8a4c00}.bad{color:#9b1c1c}
    .grid{display:grid;grid-template-columns:160px 1fr;gap:20px}.card-img{max-width:160px;border:1px solid #ddd;background:white}
  </style>
</head>
<body>
<header>
  <strong>OCG Aggregator</strong>
  <a href="/">Search</a>
  <a href="/wanted/">Wanted list</a>
  <a href="/status/">Status</a>
</header>
<main>
  {% for message in messages %}<p>{{ message }}</p>{% endfor %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
