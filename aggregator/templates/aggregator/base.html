<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OCG Aggregator</title>
  <style>
    :root{
      --bg:#070b14;--panel:#0d1424;--panel-2:#111b2f;--line:#25324a;--line-soft:#1b2639;
      --text:#eef3ff;--muted:#95a1b8;--faint:#64708a;--blue:#4d8cff;--blue-2:#0f5cff;
      --green:#2fd17c;--red:#ff6b64;--amber:#f2b84b;--rust:#b9573f;--chip:#17233a;
    }
    *{box-sizing:border-box}
    body{
      font-family:"Noto Sans","Noto Sans JP",system-ui,-apple-system,Segoe UI,sans-serif;
      margin:0;background:var(--bg);color:var(--text);font-size:15px;letter-spacing:0;
    }
    a{color:inherit;text-decoration:none}
    header{
      min-height:64px;background:#040813;border-bottom:1px solid var(--line-soft);
      padding:0 24px;display:flex;gap:28px;align-items:center;position:sticky;top:0;z-index:10;
    }
    header strong{font-size:16px;letter-spacing:0;font-weight:800}
    header nav{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    header a{color:var(--muted);padding:9px 12px;border-radius:6px}
    header a:hover{background:var(--chip);color:var(--text)}
    main{max-width:1280px;margin:0 auto;padding:28px 24px 48px}
    h1{font-size:30px;line-height:1.1;margin:0 0 18px}
    h2{font-size:18px;margin:30px 0 12px}
    h3{font-size:16px;margin:20px 0 10px}
    p{line-height:1.5}
    table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line-soft);border-radius:8px;overflow:hidden}
    th,td{padding:12px;border-bottom:1px solid var(--line-soft);text-align:left;vertical-align:middle}
    th{color:var(--muted);font-size:12px;text-transform:uppercase;font-weight:700;background:#0a1020}
    tr:last-child td{border-bottom:0}
    input,textarea,select,button{
      font:inherit;color:var(--text);background:#08101f;border:1px solid var(--line);border-radius:6px;padding:10px 11px;
    }
    input,textarea,select{width:100%}
    textarea{min-height:180px;resize:vertical}
    button,.button{
      display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--blue-2);
      border-color:var(--blue-2);color:white;cursor:pointer;font-weight:700;min-height:40px;
    }
    button:hover,.button:hover{background:var(--blue);border-color:var(--blue)}
    .page-head{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;margin-bottom:18px}
    .page-kicker{color:var(--muted);font-size:13px;margin:0}
    .panel{background:var(--panel);border:1px solid var(--line-soft);border-radius:8px;padding:18px}
    .panel.alt{background:var(--panel-2)}
    .stat-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:18px}
    .stat{background:var(--panel);border:1px solid var(--line-soft);border-radius:8px;padding:15px}
    .stat span{display:block;color:var(--muted);font-size:12px;text-transform:uppercase;font-weight:700}
    .stat strong{display:block;font-size:26px;margin-top:6px}
    .filter-grid{display:grid;grid-template-columns:2fr repeat(4,minmax(130px,1fr)) auto;gap:10px;align-items:end}
    .field label{display:block;color:var(--muted);font-size:12px;font-weight:700;margin-bottom:6px;text-transform:uppercase}
    .check-field{height:42px;display:flex;align-items:center;gap:9px;color:var(--muted);white-space:nowrap}
    .check-field input{width:auto}
    .card-line{display:flex;gap:12px;align-items:center;min-width:230px}
    .thumb{width:44px;height:62px;flex:0 0 44px;border-radius:5px;background:#172036;border:1px solid var(--line);object-fit:cover}
    .thumb.placeholder{display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:11px;font-weight:800}
    .code{font-weight:800}.sub{display:block;color:var(--muted);font-size:13px;margin-top:2px}
    .price{color:var(--green);font-size:18px;font-weight:800}.negative{color:var(--red)}.warning{color:var(--amber)}
    .muted{color:var(--muted)}.faint{color:var(--faint)}
    .pill{display:inline-flex;align-items:center;padding:3px 8px;border-radius:999px;background:var(--chip);color:var(--muted);font-size:12px;font-weight:700}
    .pill.good{background:rgba(47,209,124,.13);color:var(--green)}.pill.bad{background:rgba(255,107,100,.12);color:var(--red)}
    .pill.warn{background:rgba(242,184,75,.14);color:var(--amber)}
    .warn{color:var(--amber)}.bad{color:var(--red)}
    .detail-grid{display:grid;grid-template-columns:220px 1fr;gap:20px;align-items:start}
    .card-img{width:220px;max-width:100%;border-radius:8px;border:1px solid var(--line);background:#101a2e}
    .market-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-top:12px}
    .offer-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
    .offer{background:var(--panel);border:1px solid var(--line-soft);border-radius:8px;padding:14px}
    .offer-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .plan-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:14px}
    .total-bar{display:flex;justify-content:space-between;gap:12px;align-items:center;background:#071021;border:1px solid var(--line);border-radius:8px;padding:14px;margin-top:14px}
    @media (max-width:900px){
      header{align-items:flex-start;flex-direction:column;padding:14px 18px;gap:10px}
      main{padding:20px 14px}.stat-grid,.market-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .filter-grid{grid-template-columns:1fr}.detail-grid{grid-template-columns:1fr}
      table{display:block;overflow-x:auto;white-space:nowrap}
    }
  </style>
</head>
<body>
<header>
  <strong>OCG Aggregator</strong>
  <nav>
    <a href="/">Market</a>
    <a href="/wanted/">Wanted list</a>
    <a href="/status/">Status</a>
  </nav>
</header>
<main>
  {% for message in messages %}<p>{{ message }}</p>{% endfor %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
